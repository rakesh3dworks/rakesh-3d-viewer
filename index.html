<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rakesh 3D Viewer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:#474346;
}

/* LOGIN */
#loginOverlay{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#111,#222);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}
.loginBox{
    background:#1e1e1e;
    padding:40px;
    border-radius:12px;
    width:320px;
    text-align:center;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}
.loginBox h2{color:white;margin-bottom:20px;}
.loginBox input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
}
.loginBox button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#4cafef;
    color:white;
    font-weight:bold;
    cursor:pointer;
}
#errorMsg{color:red;font-size:13px;margin-top:8px;}

/* APP */
#app{
    display:none;
    width:100vw;
    height:100vh;
    position:relative;
}

/* SIDEBAR */
#sidebar{
    position:absolute;
    width:260px;
    top:0;
    left:0;
    bottom:0;
    background:#111;
    padding:20px;
    color:white;
    overflow-y:auto;
    box-sizing:border-box;
}
#sidebar h2{margin-top:0;}
.control{margin-bottom:18px;}
label{font-size:13px;}
input[type=range]{width:100%;}
select{width:100%;padding:6px;}
button{
    width:100%;
    padding:9px;
    margin-top:8px;
    border:none;
    background:#222;
    color:white;
    border-radius:4px;
    cursor:pointer;
}
button:hover{background:#333;}

/* VIEWER */
#viewer{
    position:absolute;
    left:260px;
    right:0;
    top:0;
    bottom:0;
}

/* HIDE UI BUTTON */
#showUI{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:#111;
    color:white;
    padding:6px 14px;
    border-radius:4px;
    display:none;
    cursor:pointer;
}

#footer{
    position:absolute;
    right:20px;
    bottom:15px;
    color:rgba(255,255,255,0.4);
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginOverlay">
    <div class="loginBox">
        <h2>Client Access</h2>
        <input type="password" id="passwordInput" placeholder="Enter password">
        <button onclick="checkPassword()">Login</button>
        <div id="errorMsg"></div>
    </div>
</div>

<div id="app">
    <div id="sidebar">
        <h2>Rakesh 3D Viewer</h2>

        <div class="control">
            <label>Zoom</label>
            <input type="range" id="zoomSlider" min="2" max="20" step="0.1" value="6">
        </div>

        <div class="control">
            <label>Manual Rotation</label>
            <input type="range" id="manualRotate" min="-180" max="180" step="1" value="0">
        </div>

        <div class="control">
            <label>Turntable Speed</label>
            <input type="range" id="speedSlider" min="0" max="0.1" step="0.001" value="0.01">
        </div>

        <div class="control">
            <label>Light Intensity</label>
            <input type="range" id="lightSlider" min="0" max="2" step="0.1" value="0.2">
        </div>

        <div class="control">
            <label>Light Rotation</label>
            <input type="range" id="lightRotateSlider" min="0" max="360" step="1" value="45">
        </div>

        <div class="control">
            <label>Background</label>
            <select id="bgSelect">
                <option value="#ffffff">White</option>
                <option value="#474346" selected>Grey</option>
                <option value="#000000">Black</option>
            </select>
        </div>

        <button onclick="toggleTexture()">Toggle Texture / Clay</button>
        <button onclick="toggleAutoRotate()">Auto Rotate</button>
        <button onclick="toggleLightRotate()">Auto Light Rotate</button>
        <button onclick="autoFrame()">Auto Frame</button>
        <button onclick="takeScreenshot()">Screenshot</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
        <button onclick="hideUI()">Hide UI</button>
    </div>

    <div id="viewer"></div>
    <div id="showUI" onclick="showUI()">Show UI</div>
    <div id="footer">Rakesh 3D Works</div>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

let scene,camera,renderer,model,controls,light;
let autoRotate=false;
let autoLightRotate=false;
let rotateSpeed=0.01;
let useTexture=true;

init();

function init(){
scene=new THREE.Scene();

camera=new THREE.PerspectiveCamera(60,(window.innerWidth-260)/window.innerHeight,0.1,1000);
camera.position.set(0,2,6);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth-260,window.innerHeight);
renderer.setClearColor("#474346");
document.getElementById("viewer").appendChild(renderer.domElement);

controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

light=new THREE.DirectionalLight(0xffffff,0.2);
light.position.set(5,10,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.6));

const loader=new GLTFLoader();
loader.load("model.glb",g=>{
model=g.scene;
scene.add(model);
});

window.addEventListener("resize",resize);
animate();
}

function resize(){
camera.aspect=(window.innerWidth-260)/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth-260,window.innerHeight);
}

function animate(){
requestAnimationFrame(animate);

if(model){
if(autoRotate) model.rotation.y+=rotateSpeed;
model.rotation.y=THREE.MathUtils.degToRad(document.getElementById("manualRotate").value);
}

if(autoLightRotate){
let t=Date.now()*0.001;
light.position.x=Math.sin(t)*5;
light.position.z=Math.cos(t)*5;
}

controls.update();
renderer.render(scene,camera);
}

/* CONTROLS */
zoomSlider.oninput=e=>camera.position.z=e.target.value;
speedSlider.oninput=e=>rotateSpeed=parseFloat(e.target.value);
lightSlider.oninput=e=>light.intensity=e.target.value;

lightRotateSlider.oninput=e=>{
let angle=THREE.MathUtils.degToRad(e.target.value);
light.position.x=Math.cos(angle)*5;
light.position.z=Math.sin(angle)*5;
};

bgSelect.onchange=e=>renderer.setClearColor(e.target.value);

window.toggleAutoRotate=()=>autoRotate=!autoRotate;
window.toggleLightRotate=()=>autoLightRotate=!autoLightRotate;

window.toggleTexture=()=>{
if(!model) return;
useTexture=!useTexture;
model.traverse(o=>{
if(o.isMesh){
if(useTexture){
o.material=o.userData.original||o.material;
}else{
o.userData.original=o.material;
o.material=new THREE.MeshStandardMaterial({color:0xaaaaaa});
}
}
});
};

window.autoFrame=()=>{
camera.position.set(0,2,6);
controls.target.set(0,1,0);
};

window.takeScreenshot=()=>{
let link=document.createElement("a");
link.download="render.png";
link.href=renderer.domElement.toDataURL();
link.click();
};

window.toggleFullscreen=()=>{
if(!document.fullscreenElement){
document.body.requestFullscreen();
}else{
document.exitFullscreen();
}
};

window.hideUI=()=>{
sidebar.style.display="none";
viewer.style.left="0";
resize();
showUI.style.display="block";
};

window.showUI=()=>{
sidebar.style.display="block";
viewer.style.left="260px";
resize();
showUI.style.display="none";
};
</script>

<script>
function checkPassword(){
    const pass="rakesh123";

    if(passwordInput.value===pass){

        loginOverlay.style.display="none";
        app.style.display="block";

        // 🔥 Force proper resize AFTER app becomes visible
        setTimeout(()=>{
            window.dispatchEvent(new Event('resize'));
        }, 100);

    }else{
        errorMsg.innerText="Wrong password!";
    }
}
}
</script>

</body>
</html>
