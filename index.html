<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rakesh 3D Works - Secure Viewer</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  display:flex;
  background:#474346;
}

/* ================= LOGIN SCREEN ================= */

#loginOverlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#loginBox{
  background:#1c1c1c;
  padding:40px;
  width:320px;
  border-radius:8px;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
  text-align:center;
  color:white;
}

#loginBox h2{
  margin-top:0;
  font-weight:normal;
  margin-bottom:20px;
}

#loginBox input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:4px;
  background:#2a2a2a;
  color:white;
}

#loginBox button{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:none;
  border-radius:4px;
  background:#333;
  color:white;
  cursor:pointer;
}

#loginBox button:hover{
  background:#444;
}

#errorMsg{
  color:#ff5555;
  font-size:13px;
  margin-top:10px;
}

/* ================= SIDE PANEL ================= */

#ui{
  width:260px;
  height:100vh;
  background:rgba(20,20,20,0.97);
  color:white;
  padding:20px;
  box-sizing:border-box;
  overflow-y:auto;
}

#viewer{
  flex:1;
  position:relative;
}

#watermark{
  position:absolute;
  bottom:20px;
  right:30px;
  color:white;
  opacity:0.35;
  pointer-events:none;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<!-- ================= LOGIN ================= -->

<div id="loginOverlay">
  <div id="loginBox">
    <h2>Rakesh 3D Works</h2>
    <div>Client Access</div>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Access Viewer</button>
    <div id="errorMsg"></div>
  </div>
</div>

<!-- ================= VIEWER ================= -->

<div id="ui">
<h3>Viewer Controls</h3>
<button onclick="toggleRotate()">Auto Rotate</button>
<button onclick="toggleTextureMode()">Texture / Clay</button>
</div>

<div id="viewer">
<div id="watermark">Rakesh 3D Works</div>
</div>

<script type="module">

/* ================= PASSWORD LOGIC ================= */

const ACCESS_PASSWORD = "rakesh123";  // CHANGE THIS PER CLIENT

window.checkPassword = function(){
  const input = document.getElementById("passwordInput").value;

  if(input === ACCESS_PASSWORD){
    document.getElementById("loginOverlay").style.display="none";
  } else {
    document.getElementById("errorMsg").innerText="Incorrect password";
  }
};

/* ================= THREE JS VIEWER ================= */

import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { RGBELoader } from "three/addons/loaders/RGBELoader.js";

let model;
let autoRotate=false;
let clayMode=false;
let originalMaterials=[];

const scene=new THREE.Scene();
scene.background=new THREE.Color("#474346");

const camera=new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight,0.1,1000);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.4;
document.getElementById("viewer").appendChild(renderer.domElement);

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const pmrem=new THREE.PMREMGenerator(renderer);
new RGBELoader().setPath('./').load('studio.hdr',tex=>{
  const env=pmrem.fromEquirectangular(tex).texture;
  scene.environment=env;
});

const hemi=new THREE.HemisphereLight(0xffffff,0x222222,1.2);
scene.add(hemi);

const light=new THREE.DirectionalLight(0xffffff,0.5);
light.position.set(5,5,5);
scene.add(light);

const loader=new GLTFLoader();
loader.load('model.glb',gltf=>{
  model=gltf.scene;
  model.traverse(c=>{
    if(c.isMesh){
      originalMaterials.push({mesh:c,material:c.material});
      c.material.envMapIntensity=2.0;
    }
  });
  scene.add(model);
  camera.position.set(0,2,6);
});

window.toggleRotate=()=>autoRotate=!autoRotate;

window.toggleTextureMode=()=>{
  clayMode=!clayMode;
  if(clayMode){
    model.traverse(c=>{
      if(c.isMesh){
        c.material=new THREE.MeshStandardMaterial({
          color:0xdddddd,
          roughness:0.8,
          metalness:0
        });
      }
    });
  }else{
    originalMaterials.forEach(entry=>{
      entry.mesh.material=entry.material;
    });
  }
};

function animate(){
  requestAnimationFrame(animate);
  if(autoRotate && model){
    model.rotation.y+=0.01;
  }
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
