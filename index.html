<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rakesh 3D Works - Pro Viewer</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
  display:flex;
  background:#474346;
}

/* PASSWORD OVERLAY */
#loginOverlay{
  position:fixed;
  inset:0;
  background:linear-gradient(135deg,#111,#222);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.loginBox{
  background:#1e1e1e;
  padding:40px;
  border-radius:12px;
  width:320px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,0,0,0.6);
}

.loginBox h2{
  color:white;
  margin-bottom:20px;
  font-weight:normal;
}

.loginBox input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  margin-bottom:15px;
}

.loginBox button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:6px;
  background:#4cafef;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#errorMsg{
  color:red;
  font-size:13px;
  margin-top:8px;
}

#app{
  display:none;
  width:100%;
  display:flex;
}

/* ===== ORIGINAL UI (UNCHANGED) ===== */

#ui{
  width:260px;
  height:100vh;
  background:rgba(20,20,20,0.97);
  color:white;
  padding:20px;
  box-sizing:border-box;
  overflow-y:auto;
}

#ui h3{ margin-top:0; font-weight:normal; }

label{
  display:block;
  margin-top:14px;
  font-size:13px;
}

input[type=range], select{
  width:100%;
  margin-top:6px;
}

button{
  width:100%;
  margin-top:10px;
  padding:8px;
  border:none;
  background:#1e1e1e;
  color:white;
  border-radius:4px;
  cursor:pointer;
}

button:hover{ background:#333; }

#viewer{ flex:1; position:relative; }

#showUIButton{
  position:absolute;
  top:20px;
  left:20px;
  display:none;
  z-index:20;
  padding:8px 12px;
  background:#1e1e1e;
  color:white;
  border:none;
  border-radius:4px;
  cursor:pointer;
}

#watermark{
  position:absolute;
  bottom:20px;
  right:30px;
  color:white;
  opacity:0.35;
  pointer-events:none;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<!-- PASSWORD -->
<div id="loginOverlay">
  <div class="loginBox">
    <h2>Client Access</h2>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Login</button>
    <div id="errorMsg"></div>
  </div>
</div>

<div id="app">

<!-- ===== YOUR ORIGINAL HTML BELOW (UNCHANGED) ===== -->

<div id="ui">
<h3>Rakesh 3D Viewer</h3>

<label>Zoom</label>
<input type="range" min="1" max="15" step="0.1" value="6" id="zoomSlider">

<label>Manual Rotation</label>
<input type="range" min="0" max="360" step="1" value="0" id="rotationSlider">

<label>Turntable Speed</label>
<input type="range" min="0" max="0.1" step="0.005" value="0.01" id="speedSlider">

<label>Light Intensity</label>
<input type="range" min="0" max="5" step="0.1" value="0.5" id="lightSlider">

<label>Light Rotation</label>
<input type="range" min="0" max="360" step="1" value="45" id="lightRotateSlider">

<label>Background</label>
<select id="bgSelect">
<option value="white">White</option>
<option value="grey" selected>Grey</option>
<option value="black">Black</option>
</select>

<button onclick="toggleTextureMode()">Toggle Texture / Clay</button>
<button onclick="toggleRotate()">Auto Rotate</button>
<button onclick="rotateLight()">Auto Light Rotate</button>
<button onclick="autoFrame()">Auto Frame</button>
<button onclick="takeShot()">Screenshot</button>
<button onclick="toggleFullscreen()">Fullscreen</button>
<button onclick="hideUI()">Hide UI</button>

</div>

<div id="viewer">
<button id="showUIButton" onclick="showUI()">Show UI</button>
<div id="watermark">Rakesh 3D Works</div>
</div>

</div>

<!-- PASSWORD SCRIPT -->
<script>
function checkPassword(){
  const correctPassword="rakesh123";   // 🔒 change this

  if(document.getElementById("passwordInput").value===correctPassword){

    document.getElementById("loginOverlay").style.display="none";
    document.getElementById("app").style.display="flex";

    // Force resize AFTER showing app
    setTimeout(()=>{
      window.dispatchEvent(new Event('resize'));
    },100);

  }else{
    document.getElementById("errorMsg").innerText="Wrong password!";
  }
}
</script>
